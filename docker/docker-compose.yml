name: mono-repo

services:
    postgres:
        image: postgres:16-alpine
        container_name: mono-postgres
        restart: unless-stopped
        ports:
            - '5432:5432'
        environment:
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: 123zhangbei
        volumes:
            - postgres_data:/var/lib/postgresql/data
        healthcheck:
            test: ['CMD-SHELL', 'pg_isready -U postgres']
            interval: 5s
            timeout: 5s
            retries: 5

    mysql:
        image: mysql:8.4
        container_name: mono-mysql
        restart: unless-stopped
        ports:
            - '3306:3306'
        environment:
            MYSQL_ROOT_PASSWORD: 123zhangbei
            MYSQL_DATABASE: mono_repo
        volumes:
            - mysql_data:/var/lib/mysql
        healthcheck:
            test: ['CMD', 'mysqladmin', 'ping', '-h', '127.0.0.1', '-uroot', '-p123zhangbei']
            interval: 5s
            timeout: 5s
            retries: 10

    redis:
        image: redis:7-alpine
        container_name: mono-redis
        restart: unless-stopped
        ports:
            - '6379:6379'
        volumes:
            - redis_data:/data
        healthcheck:
            test: ['CMD', 'redis-cli', 'ping']
            interval: 5s
            timeout: 5s
            retries: 5

volumes:
    postgres_data:
    mysql_data:
    redis_data:
