name: mono-repo

services:
    redis:
        image: redis:7-alpine
        container_name: mono-repo-redis
        restart: unless-stopped
        command: redis-server --appendonly yes
        ports:
            - '6379:6379'
        volumes:
            - redis_data:/data
        healthcheck:
            test: ['CMD', 'redis-cli', 'ping']
            interval: 5s
            timeout: 5s
            retries: 10

    postgres:
        image: postgres:16-alpine
        container_name: mono-repo-postgres
        restart: unless-stopped
        environment:
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: 123zhangbei
            POSTGRES_DB: postgres
            TZ: Asia/Shanghai
        ports:
            - '5432:5432'
        volumes:
            - postgres_data:/var/lib/postgresql/data
            - ./postgres/init:/docker-entrypoint-initdb.d:ro
        healthcheck:
            test: ['CMD-SHELL', 'pg_isready -U postgres -d postgres']
            interval: 5s
            timeout: 5s
            retries: 10

    mysql:
        image: mysql:8.0
        container_name: mono-repo-mysql
        restart: unless-stopped
        environment:
            MYSQL_ROOT_PASSWORD: 123zhangbei
            TZ: Asia/Shanghai
        ports:
            - '3306:3306'
        volumes:
            - mysql_data:/var/lib/mysql
        healthcheck:
            test: ['CMD-SHELL', 'mysqladmin ping -h localhost -uroot -p$$MYSQL_ROOT_PASSWORD || exit 1']
            interval: 5s
            timeout: 5s
            retries: 10

    nacos:
        image: nacos/nacos-server:v3.2.0
        container_name: mono-repo-nacos
        restart: unless-stopped
        depends_on:
            postgres:
                condition: service_healthy
        environment:
            MODE: standalone
            EMBEDDED_STORAGE: 'false'
            PREFER_HOST_MODE: hostname
            SPRING_DATASOURCE_PLATFORM: postgresql
            DB_NUM: 1
            DB_URL_0: jdbc:postgresql://postgres:5432/nacos?tcpKeepAlive=true&reWriteBatchedInserts=true
            DB_USER_0: postgres
            DB_PASSWORD_0: 123zhangbei
            DB_POOL_CONFIG_DRIVERCLASSNAME: org.postgresql.Driver
            NACOS_CONFIG_NAMESPACE_COMPATIBLE_MODE: 'false'
            NACOS_AUTH_ENABLE: 'false'
            NACOS_AUTH_ADMIN_ENABLE: 'true'
            NACOS_AUTH_CONSOLE_ENABLE: 'true'
            NACOS_AUTH_TOKEN: U2VjcmV0S2V5MDEyMzQ1Njc4OTAxMjM0NTY3ODkwMTIzNDU2Nzg5MDEyMzQ1Njc4OTAxMjM0NTY3ODk=
            NACOS_AUTH_IDENTITY_KEY: serverIdentity
            NACOS_AUTH_IDENTITY_VALUE: security
            JVM_XMS: 256m
            JVM_XMX: 512m
            JVM_XMN: 128m
            TZ: Asia/Shanghai
        ports:
            - '8848:8848'
            - '9848:9848'
            - '8080:8080'
        volumes:
            - nacos_logs:/home/nacos/logs
        healthcheck:
            test: ['CMD-SHELL', 'curl -fsS http://127.0.0.1:8848/nacos/v3/admin/core/state/readiness || exit 1']
            interval: 10s
            timeout: 5s
            retries: 12
            start_period: 45s

volumes:
    redis_data:
    postgres_data:
    mysql_data:
    nacos_logs:
